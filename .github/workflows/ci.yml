name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# dorny/test-reporter needs checks:write to publish the test report as a check run.
permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Test (vitest + coverage)
        # CI=true makes vitest also emit test-results/junit.xml (see vitest.config.ts).
        run: npm run coverage

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Report
          path: test-results/junit.xml
          reporter: java-junit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage
          if-no-files-found: warn

      - name: Build (extension + webview bundles)
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce@latest package -o terragrunt-diagram-trace.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: terragrunt-diagram-trace-vsix
          path: terragrunt-diagram-trace.vsix
          if-no-files-found: error
